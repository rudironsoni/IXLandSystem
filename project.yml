name: IXLandSystem
settings:
  base:
    GCC_TREAT_WARNINGS_AS_ERRORS: true
    SWIFT_TREAT_WARNINGS_AS_ERRORS: true
    LINUX_UAPI_VERSION: '6.12'
    LINUX_UAPI_ARCH: arm64
    LINUX_UAPI_VENDOR_ROOT: $(SRCROOT)/third_party/linux-uapi
    LINUX_UAPI_ROOT: $(LINUX_UAPI_VENDOR_ROOT)/$(LINUX_UAPI_VERSION)/$(LINUX_UAPI_ARCH)
    LINUX_UAPI_INCLUDE_ROOT: $(LINUX_UAPI_ROOT)/include
targets:
  IXLandSystem:
    type: library.static
    platform: iOS
    deploymentTarget:
      iOS: '16.0'
    settings:
      HEADER_SEARCH_PATHS:
      - $(SRCROOT)/include
      - $(SRCROOT)
      - $(LINUX_UAPI_INCLUDE_ROOT)
      - $(LINUX_UAPI_INCLUDE_ROOT)/uapi
      GCC_PREPROCESSOR_DEFINITIONS:
      - _XOPEN_SOURCE
      CLANG_ENABLE_OBJC_ARC: true
      CLANG_WARN_DOCUMENTATION_COMMENTS: true
      OTHER_CFLAGS:
      - -fvisibility=hidden
    sources:
    - path: fs/eventpoll.c
      group: fs
    - path: fs/exec.c
      group: fs
    - path: fs/fcntl.c
      group: fs
    - path: fs/fdtable.c
      group: fs
    - path: internal/ios/fs/backing_io.m
      group: internal/ios/fs
    - path: internal/ios/fs/backing_io.h
      group: internal/ios/fs
    - path: internal/ios/fs/path_host.c
      group: internal/ios/fs
    - path: internal/ios/fs/path_host.h
      group: internal/ios/fs
    - path: internal/ios/fs/backing_paths.m
      group: internal/ios/fs
    - path: fs/inode.c
      group: fs
    - path: fs/ioctl.c
      group: fs
    - path: fs/mount.c
      group: fs
    - path: fs/namei.c
      group: fs
    - path: fs/open.c
      group: fs
    - path: fs/poll.c
      group: fs
    - path: fs/pty.c
      group: fs
    - path: fs/path.c
      group: fs
    - path: fs/read_write.c
      group: fs
    - path: fs/readdir.c
      group: fs
    - path: internal/ios/fs/wait.c
      group: internal/ios/fs
    - path: internal/ios/fs/epoll_bridge.c
      group: internal/ios/fs
    - path: fs/stat.c
      group: fs
    - path: fs/super.c
      group: fs
    - path: fs/vfs.c
      group: fs
    - path: kernel/cred.c
      group: kernel
    - path: kernel/exit.c
      group: kernel
    - path: kernel/fork.c
      group: kernel
    - path: kernel/init.c
      group: kernel
    - path: kernel/net/network.c
      group: kernel/net
    - path: kernel/pid.c
      group: kernel
    - path: kernel/random.c
      group: kernel
    - path: kernel/resource.c
      group: kernel
    - path: kernel/signal.c
      group: kernel
    - path: internal/ios/kernel/signal_bridge.c
      group: internal/ios/kernel
    - path: kernel/sync.c
      group: kernel
    - path: kernel/sys.c
      group: kernel
    - path: kernel/task.c
      group: kernel
    - path: kernel/time.c
      group: kernel
    - path: internal/ios/kernel/sync.c
      group: internal/ios/kernel
    - path: internal/ios/kernel/clock.c
      group: internal/ios/kernel
    - path: internal/ios/fs/sync.c
      group: internal/ios/fs
    - path: kernel/wait.c
      group: kernel
    - path: observability/ixland_observability.c
      group: observability
    - path: runtime/native/registry.c
      group: runtime/native
  IXLandSystemTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget:
      iOS: '16.0'
    sources:
    - IXLandSystemTests/SignalTests.m
    - IXLandSystemTests/TaskGroupTests.m
    - IXLandSystemTests/CredentialTests.m
    - IXLandSystemTests/VFSPathTests.m
    - IXLandSystemTests/RootfsBootstrapTests.m
    - IXLandSystemTests/FutexTests.m
    - IXLandSystemTests/LinuxUAPICompileSmoke.c
    - IXLandSystemTests/FutexUAPICompileSmoke.c
    - IXLandSystemTests/LinuxUAPITestSupport.c
    - IXLandSystemTests/LinuxUAPITestSupport.h
    dependencies:
    - target: IXLandSystem
    settings:
      GENERATE_INFOPLIST_FILE: true
      HEADER_SEARCH_PATHS:
      - $(SRCROOT)/include
      - $(SRCROOT)
      - $(LINUX_UAPI_INCLUDE_ROOT)
      BUNDLE_LOADER: ''
configurations:
  Debug:
    settings:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      GCC_OPTIMIZATION_LEVEL: '0'
      SWIFT_OPTIMIZATION_LEVEL: -Onone
  Release:
    settings:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      GCC_OPTIMIZATION_LEVEL: s
      SWIFT_OPTIMIZATION_LEVEL: -O
schemes:
  IXLandSystem-6.12-arm64:
    build:
      targets:
        IXLandSystem: all
        IXLandSystemTests: all
    test:
      targets:
      - IXLandSystemTests
